name: Microservices CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  DOCKER_USER: migaradenuwan

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build User Service with Maven
        run: mvn -B package --file Backend/user-service/pom.xml -DskipTests

      - name: Build Notification Service with Maven
        run: mvn -B package --file Backend/notification-service/pom.xml -DskipTests

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build Provider Service
        run: cd Backend/provider-service && npm install

      - name: Build Appointment Service
        run: cd Backend/appointment-service && npm install

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan (Backend)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: Backend/user-service

  docker-build-push:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push User Service Image
        uses: docker/build-push-action@v4
        with:
          context: Backend/user-service
          push: true
          tags: ${{ env.DOCKER_USER }}/user-service:latest

      - name: Build and push Notification Service Image
        uses: docker/build-push-action@v4
        with:
          context: Backend/notification-service
          push: true
          tags: ${{ env.DOCKER_USER }}/notification-service:latest
          
      - name: Build and push Provider Service Image
        uses: docker/build-push-action@v4
        with:
          context: Backend/provider-service
          push: true
          tags: ${{ env.DOCKER_USER }}/provider-service:latest

      - name: Build and push Appointment Service Image
        uses: docker/build-push-action@v4
        with:
          context: Backend/appointment-service
          push: true
          tags: ${{ env.DOCKER_USER }}/appointment-service:latest

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: frontend
          push: true
          tags: ${{ env.DOCKER_USER }}/frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Cloud (Render / Remote server)
        run: |
          echo "Triggering deployment webhook..."
          # Example for Render Webhook: curl -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }}
          echo "Deployment triggered successfully!"
