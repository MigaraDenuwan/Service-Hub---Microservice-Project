version: "3.9"

services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  postgres:
    image: postgres:17
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1238450
      POSTGRES_DB: appointments_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appointments_db"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    restart: always
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - mongodb
      - eureka-server
    environment:
      SPRING_DATA_MONGODB_URI: mongodb+srv://it22143204:ZfTg6QRxfTY1Fgam@cluster0.any78ur.mongodb.net/Micro-Service-user?retryWrites=true&w=majority&appName=Cluster0
      SPRING_APPLICATION_NAME: user-service
      SERVER_PORT: 8082
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/

  provider-service:
    build: ./provider-service
    container_name: provider-service
    restart: always
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
      - eureka-server
    environment:
      MONGO_URI: mongodb+srv://it22143204:ZfTg6QRxfTY1Fgam@cluster0.any78ur.mongodb.net/Micro-Service-provider?retryWrites=true&w=majority&appName=Cluster0
      PORT: 5001

  appointment-service:
    build: ./appointment-service
    container_name: appointment-service
    restart: always
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      provider-service:
        condition: service_started
      eureka-server:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 1238450
      DB_NAME: appointments_db
      PROVIDER_SERVICE_URL: http://provider-service:5001
      PORT: 5002
      NODE_ENV: production

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: always
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
    environment:
      SPRING_APPLICATION_NAME: notification-service
      SERVER_PORT: 8084
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/

  frontend:
    build: ../frontend
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - user-service
      - provider-service
      - appointment-service
      - notification-service

volumes:
  mongo-data:
  postgres-data:
